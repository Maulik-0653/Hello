name: hello

on: push

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE20: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone repository
        run: git clone https://github.com/Maulik-0653/Action

      - name: list files
        run: ls -la

      - name: setup node
        uses: actions/setup-node@v3
        with: 
          node-version: '18'